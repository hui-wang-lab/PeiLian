<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>评估报告 — PeiLian</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="nav">
  <div class="brand">
    <span class="logo">P</span>
    <span>PeiLian 陪练系统</span>
  </div>
  <div class="nav-links">
    <a href="/">首页</a>
  </div>
  <div class="spacer"></div>
  <button class="btn btn-outline" onclick="window.print()">打印报告</button>
  <a href="/" class="btn btn-primary">开始新陪练</a>
</nav>

<div class="container">
  <div id="report-loading" style="text-align:center;padding:60px 20px;">
    <span class="loading"></span>
    <div style="margin-top:12px;color:var(--text-secondary);font-size:14px;">正在生成评估报告，请稍候...</div>
  </div>

  <div id="report-content" style="display:none;" class="fade-in">
    <div class="card report-section">
      <h2>综合评分</h2>
      <p class="card-subtitle">五个维度按 0–5 分评估，外环为满分参考。</p>
      <div id="radar-chart" class="radar-chart"></div>
    </div>

    <div class="card report-section">
      <h2>逐句标注</h2>
      <p class="card-subtitle">每句话打上 KYC 必问点 / 合规命中标签，便于复盘。</p>
      <div id="dialogue-annotated" class="dialogue-annotated"></div>
    </div>

    <div class="card report-section compliance-section">
      <h2>合规扫描</h2>
      <p class="card-subtitle">监管违禁话术由规则层硬卡，不依赖 LLM 概率判断。</p>
      <div id="compliance-section"></div>
    </div>

    <div class="card report-section customer-report-section">
      <h2>AI 客户行为诊断</h2>
      <p class="card-subtitle">检查 AI 客户是否过早暴露隐私字段或前后矛盾，定位训练价值瑕疵。</p>
      <div id="customer-report"></div>
    </div>

    <div style="text-align:center;padding:8px 20px 24px;">
      <a href="/" class="btn btn-primary btn-lg">开始新一轮陪练</a>
    </div>
  </div>
</div>

<script src="/vendor/echarts.min.js"></script>
<script src="/js/report.js"></script>
</body>
</html>
